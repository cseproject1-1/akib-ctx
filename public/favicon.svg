      <line x1="0" y1="0" x2="-45" y2="-30"/>
      <line x1="0" y1="0" x2="45" y2="-30"/>
      <line x1="0" y1="0" x2="45" y2="30"/>
      <line x1="0" y1="0" x2="0" y2="60"/>
      <line x1="0" y1="0" x2="-45" y2="30"/>
      
      <circle cx="-45" cy="-30" r="4.5" fill="#000000"/>
