<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCode Graph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            background-color: #1e1e1e;
            color: #d4d4d4;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #graph {
            width: 100vw;
            height: 100vh;
        }
        .node {
            stroke: #fff;
            stroke-width: 1.5px;
            cursor: pointer;
            transition: stroke-width 0.2s;
        }
        .node:hover {
            stroke-width: 3px;
        }
        .link {
            stroke: #999;
            stroke-opacity: 0.6;
            stroke-width: 1px;
        }
        .label {
            font-size: 10px;
            pointer-events: none;
            fill: #fff;
            text-shadow: 0 1px 0 #000;
        }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .legend {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }
        .dot { height: 10px; width: 10px; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="controls">
        <div class="legend"><span class="dot" style="background: #ff7f0e;"></span> Function</div>
        <div class="legend"><span class="dot" style="background: #1f77b4;"></span> Class</div>
        <div class="legend"><span class="dot" style="background: #2ca02c;"></span> Interface</div>
        <button onclick="resetZoom()">Reset Zoom</button>
    </div>
    <svg id="graph"></svg>

    <script>
        const vscode = acquireVsCodeApi();
        const svg = d3.select("#graph");
        const width = window.innerWidth;
        const height = window.innerHeight;

        const simulation = d3.forceSimulation()
            .force("link", d3.forceLink().id(d => d.id).distance(100))
            .force("charge", d3.forceManyBody().strength(-200))
            .force("center", d3.forceCenter(width / 2, height / 2));

        const g = svg.append("g");
        
        const zoom = d3.zoom()
            .scaleExtent([0.1, 10])
            .on("zoom", (event) => g.attr("transform", event.transform));

        svg.call(zoom);

        window.addEventListener('message', event => {
            const message = event.data;
            switch (message.command) {
                case 'updateGraph':
                    renderGraph(message.data);
                    break;
            }
        });

        function renderGraph(data) {
            g.selectAll("*").remove();

            const link = g.append("g")
                .attr("class", "links")
                .selectAll("line")
                .data(data.links)
                .enter().append("line")
                .attr("class", "link");

            const node = g.append("g")
                .attr("class", "nodes")
                .selectAll("circle")
                .data(data.nodes)
                .enter().append("circle")
                .attr("class", "node")
                .attr("r", 8)
                .attr("fill", d => getColor(d.type))
                .call(d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                    .on("end", dragended))
                .on("click", (event, d) => {
                    vscode.postMessage({ command: 'openFile', filePath: d.filePath, line: d.lineStart });
                });

            node.append("title").text(d => d.name);

            const label = g.append("g")
                .selectAll("text")
                .data(data.nodes)
                .enter().append("text")
                .attr("class", "label")
                .text(d => d.name);

            simulation.nodes(data.nodes).on("tick", () => {
                link
                    .attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);

                node
                    .attr("cx", d => d.x)
                    .attr("cy", d => d.y);

                label
                    .attr("x", d => d.x + 10)
                    .attr("y", d => d.y + 3);
            });

            simulation.force("link").links(data.links);
            simulation.alpha(1).restart();
        }

        function getColor(type) {
            switch(type) {
                case 'function': return '#ff7f0e';
                case 'class': return '#1f77b4';
                case 'interface': return '#2ca02c';
                default: return '#7f7f7f';
            }
        }

        function resetZoom() {
            svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
        }

        function dragstarted(event) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            event.subject.fx = event.subject.x;
            event.subject.fy = event.subject.y;
        }

        function dragged(event) {
            event.subject.fx = event.x;
            event.subject.fy = event.y;
        }

        function dragended(event) {
            if (!event.active) simulation.alphaTarget(0);
            event.subject.fx = null;
            event.subject.fy = null;
        }

        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            svg.attr("width", w).attr("height", h);
            simulation.force("center", d3.forceCenter(w / 2, h / 2));
        });
    </script>
</body>
</html>
