<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0a0a0a;
      color: #ffffff;
      margin: 0;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .header {
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #7c3aed;
      margin-bottom: 4px;
    }
    .btn {
      background-color: #7c3aed;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn:hover {
      background-color: #6d28d9;
      transform: translateY(-1px);
    }
    .btn:disabled {
      background-color: #333;
      cursor: not-allowed;
    }
    .status {
      font-size: 11px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">CtxNote Clipper</div>
    <button id="clipBtn" class="btn">Save Current Page</button>
    <div id="status" class="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
